<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maneeshwar Marpu — Cloud & AI/ML Engineer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#00000f;
  --deep:#010614;
  --surface:#040e20;
  --surface2:#071628;
  --glass:rgba(4,14,32,0.6);
  --c1:#00ffee;
  --c2:#0088ff;
  --c3:#ff3d6e;
  --c4:#ff9500;
  --c5:#7fff00;
  --text:#dff0ff;
  --text2:#6a9ab8;
  --text3:#2a5070;
  --border:rgba(0,255,238,0.08);
  --border2:rgba(0,255,238,0.18);
}
html{scroll-behavior:smooth;height:100%}
body{
  background:var(--void);
  color:var(--text);
  font-family:'Syne',sans-serif;
  overflow-x:hidden;
  cursor:none;
  min-height:100%;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--void)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--c1),var(--c3));border-radius:2px}

/* CURSOR */
#cursor-dot{
  position:fixed;width:6px;height:6px;
  background:var(--c1);border-radius:50%;
  pointer-events:none;z-index:99999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px var(--c1),0 0 20px var(--c1);
  transition:width .15s,height .15s,background .15s;
}
#cursor-ring{
  position:fixed;width:32px;height:32px;
  border:1px solid rgba(0,255,238,0.4);border-radius:50%;
  pointer-events:none;z-index:99998;
  transform:translate(-50%,-50%);
  transition:width .2s,height .2s,border-color .2s;
}
#cursor-trail{
  position:fixed;pointer-events:none;z-index:99990;
  width:100%;height:100%;top:0;left:0;
}
body.hovering #cursor-dot{width:12px;height:12px;background:var(--c3)}
body.hovering #cursor-ring{width:52px;height:52px;border-color:rgba(255,61,110,0.6)}

/* WEBGL CANVAS */
#aurora-canvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:0;pointer-events:none;
}

/* GRID */
.hud-grid{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,238,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,238,0.025) 1px,transparent 1px);
  background-size:80px 80px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* NOISE */
.noise-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:2;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
  animation:noiseAnim 0.5s steps(2) infinite;
}
@keyframes noiseAnim{0%{background-position:0 0}50%{background-position:-50px -50px}100%{background-position:0 0}}

/* SCANLINE */
.scanline{
  position:fixed;top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,255,238,0.3),transparent);
  z-index:200;pointer-events:none;
  animation:scanAnim 6s linear infinite;
}
@keyframes scanAnim{0%{top:-2px;opacity:0}3%{opacity:1}97%{opacity:1}100%{top:100%;opacity:0}}

/* PROGRESS BAR */
#progress{
  position:fixed;top:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--c2),var(--c1),var(--c3));
  z-index:9000;pointer-events:none;
  box-shadow:0 0 10px var(--c1);
  transition:width .1s;
}

/* WRAPPER */
#root{position:relative;z-index:3}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:8000;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 60px;height:68px;
  background:rgba(0,0,15,0.7);
  backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid var(--border);
  transition:all .4s;
}
.nav.scrolled{
  height:56px;
  background:rgba(0,0,15,0.92);
  border-bottom-color:rgba(0,255,238,0.15);
  box-shadow:0 0 40px rgba(0,255,238,0.05);
}
.nav-logo{
  font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:800;
  letter-spacing:0.15em;color:var(--c1);text-decoration:none;
  display:flex;align-items:center;gap:10px;
}
.nav-logo-dot{
  width:8px;height:8px;background:var(--c3);border-radius:50%;
  animation:pulseDot 2s ease-in-out infinite;
  box-shadow:0 0 8px var(--c3),0 0 16px var(--c3);
}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.7}}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-link{
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;
  color:var(--text2);text-decoration:none;text-transform:uppercase;
  letter-spacing:.18em;position:relative;padding:4px 0;
  transition:color .3s;
}
.nav-link::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:var(--c1);transform:scaleX(0);transition:transform .3s;
  transform-origin:right;
}
.nav-link:hover{color:var(--c1)}
.nav-link:hover::after{transform:scaleX(1);transform-origin:left}
.nav-ping{
  display:flex;align-items:center;gap:8px;
  font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--c5);
  letter-spacing:.12em;
}
.ping-ring{
  width:10px;height:10px;border-radius:50%;background:var(--c5);
  position:relative;
}
.ping-ring::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid var(--c5);animation:pingOut 2s ease-out infinite;
}
@keyframes pingOut{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}

/* BOOT SCREEN */
.boot-screen{
  position:fixed;inset:0;z-index:99999;
  background:var(--void);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  font-family:'JetBrains Mono',monospace;
  transition:opacity .8s, visibility .8s;
}
.boot-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.boot-logo{
  font-family:'Orbitron',monospace;font-size:clamp(2rem,6vw,4rem);
  font-weight:900;letter-spacing:.2em;color:var(--c1);
  text-shadow:0 0 40px rgba(0,255,238,.5);
}
.boot-line{
  font-size:.7rem;color:var(--text3);letter-spacing:.1em;
  opacity:0;animation:bootFadeIn .4s forwards;
}
@keyframes bootFadeIn{to{opacity:1;color:var(--c1)}}
.boot-bar-wrap{
  width:280px;height:2px;background:rgba(0,255,238,.1);
  margin-top:16px;overflow:hidden;
}
.boot-bar{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--c2),var(--c1));
  box-shadow:0 0 10px var(--c1);
  animation:bootBar 2.2s ease-in-out forwards;
}
@keyframes bootBar{0%{width:0}80%{width:90%}100%{width:100%}}

/* HERO */
.hero{
  min-height:100vh;display:flex;align-items:center;
  padding:120px 60px 80px;position:relative;overflow:hidden;
}
.hero-inner{max-width:1200px;width:100%;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.hero-left{position:relative}
.hero-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:.72rem;
  color:var(--c3);text-transform:uppercase;letter-spacing:.3em;
  margin-bottom:24px;display:flex;align-items:center;gap:12px;
  opacity:0;animation:slideUp .8s forwards .3s;
}
.hero-eyebrow::before{content:'';width:40px;height:1px;background:var(--c3)}
.hero-name{
  font-family:'Orbitron',monospace;
  font-size:clamp(3rem,5.5vw,6rem);
  font-weight:900;line-height:.9;letter-spacing:-.01em;
  margin-bottom:12px;
  opacity:0;animation:slideUp .8s forwards .5s;
}
.hero-name-line1{display:block;color:var(--text)}
.hero-name-line2{
  display:block;
  background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:200% auto;
  animation:gradientShift 4s linear infinite;
}
@keyframes gradientShift{0%{background-position:0%}100%{background-position:200%}}
.hero-role{
  font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:400;
  color:var(--text2);letter-spacing:.05em;
  margin-bottom:28px;
  opacity:0;animation:slideUp .8s forwards .7s;
}
.hero-role span{color:var(--c1);font-weight:600}
.hero-desc{
  font-size:.95rem;color:var(--text3);line-height:1.9;
  max-width:480px;font-weight:400;
  margin-bottom:44px;
  opacity:0;animation:slideUp .8s forwards .9s;
}
.hero-ctas{
  display:flex;gap:16px;
  opacity:0;animation:slideUp .8s forwards 1.1s;
}
.btn-glow{
  position:relative;padding:14px 30px;
  font-family:'JetBrains Mono',monospace;font-size:.75rem;
  font-weight:500;text-decoration:none;text-transform:uppercase;
  letter-spacing:.18em;cursor:pointer;overflow:hidden;
  transition:all .3s;display:inline-flex;align-items:center;gap:10px;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
}
.btn-glow-primary{
  background:linear-gradient(135deg,var(--c2),var(--c1));
  color:var(--void);border:none;
  box-shadow:0 0 0 rgba(0,255,238,0);
}
.btn-glow-primary:hover{
  box-shadow:0 0 30px rgba(0,255,238,.4),0 0 60px rgba(0,255,238,.2);
  transform:translateY(-2px);
}
.btn-glow-outline{
  background:transparent;color:var(--c1);
  border:1px solid rgba(0,255,238,.3);
}
.btn-glow-outline:hover{
  background:rgba(0,255,238,.07);
  border-color:var(--c1);
  box-shadow:0 0 20px rgba(0,255,238,.15);
  transform:translateY(-2px);
}
.hero-stats{
  display:flex;gap:44px;margin-top:60px;padding-top:40px;
  border-top:1px solid var(--border);
  opacity:0;animation:slideUp .8s forwards 1.3s;
}
.stat-val{
  font-family:'Orbitron',monospace;font-size:2.4rem;
  font-weight:700;color:var(--c1);line-height:1;
}
.stat-key{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  color:var(--text3);text-transform:uppercase;letter-spacing:.15em;margin-top:6px;
}

/* HERO RIGHT - 3D CARD */
.hero-right{
  position:relative;display:flex;flex-direction:column;gap:20px;
  opacity:0;animation:slideUp .8s forwards 1.2s;
}
.hud-card{
  background:rgba(4,14,32,.7);border:1px solid var(--border);
  backdrop-filter:blur(20px);padding:28px;position:relative;overflow:hidden;
  transition:all .4s;
}
.hud-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c1),transparent);
  opacity:.5;
}
.hud-card-title{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;
  color:var(--c3);text-transform:uppercase;letter-spacing:.2em;
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.hud-card-title::before{content:'◆';font-size:.4rem}
.skill-bars{display:flex;flex-direction:column;gap:12px}
.skill-bar-row{display:flex;flex-direction:column;gap:6px}
.skill-bar-header{
  display:flex;justify-content:space-between;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:var(--text2);text-transform:uppercase;letter-spacing:.1em;
}
.skill-bar-track{height:3px;background:rgba(0,255,238,.08);position:relative;overflow:hidden}
.skill-bar-fill{
  height:100%;position:absolute;top:0;left:0;
  transition:width 1.5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px currentColor;
}
.mini-terminal{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;
  color:var(--text3);display:flex;flex-direction:column;gap:6px;
}
.t-line{display:flex;gap:8px}
.t-prompt{color:var(--c1)}
.t-cmd{color:var(--text2)}
.t-out{color:var(--c5);margin-left:16px}

@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* SECTION */
section{position:relative;z-index:3;padding:120px 60px}
.section-wrapper{max-width:1200px;margin:0 auto}
.section-head{margin-bottom:70px}
.section-tag{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:var(--c3);text-transform:uppercase;letter-spacing:.3em;
  margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.section-tag::before{content:'//';color:var(--c1);margin-right:4px}
.section-h{
  font-family:'Orbitron',monospace;
  font-size:clamp(2.4rem,4.5vw,4.5rem);
  font-weight:800;letter-spacing:.04em;line-height:.95;
  color:var(--text);
}
.section-h .glow-word{
  color:var(--c1);
  text-shadow:0 0 30px rgba(0,255,238,.3);
}
.section-rule{
  width:60px;height:2px;margin-top:20px;
  background:linear-gradient(90deg,var(--c1),transparent);
}

/* SKILLS */
.skills-mosaic{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2px;
}
.skill-panel{
  background:var(--surface);
  border:1px solid var(--border);
  padding:36px 32px;position:relative;overflow:hidden;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  cursor:default;
}
.skill-panel::after{
  content:'';position:absolute;bottom:0;left:0;
  width:100%;height:2px;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  transform:scaleX(0);transform-origin:left;
  transition:transform .4s;
}
.skill-panel:hover{background:var(--surface2);transform:translateY(-4px)}
.skill-panel:hover::after{transform:scaleX(1)}
.skill-panel:nth-child(even)::after{background:linear-gradient(90deg,var(--c3),var(--c4))}
.sp-num{
  font-family:'Orbitron',monospace;font-size:3.5rem;
  font-weight:900;color:rgba(0,255,238,.06);
  line-height:1;position:absolute;top:12px;right:20px;
  pointer-events:none;
}
.sp-icon{font-size:1.8rem;margin-bottom:16px}
.sp-title{
  font-family:'Orbitron',monospace;font-size:.85rem;
  font-weight:700;letter-spacing:.1em;color:var(--text);
  margin-bottom:18px;text-transform:uppercase;
}
.sp-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  font-family:'JetBrains Mono',monospace;font-size:.58rem;
  padding:4px 10px;text-transform:uppercase;letter-spacing:.08em;
  border:1px solid rgba(0,255,238,.12);color:var(--text3);
  background:rgba(0,255,238,.03);transition:all .25s;
}
.chip:hover{border-color:var(--c1);color:var(--c1);background:rgba(0,255,238,.08);box-shadow:0 0 10px rgba(0,255,238,.1)}
.skill-panel:nth-child(even) .chip{border-color:rgba(255,61,110,.12);background:rgba(255,61,110,.03)}
.skill-panel:nth-child(even) .chip:hover{border-color:var(--c3);color:var(--c3)}

/* EXPERIENCE */
.exp-layout{display:grid;grid-template-columns:200px 1fr;gap:60px}
.exp-nav{position:sticky;top:120px;height:fit-content;display:flex;flex-direction:column;gap:2px}
.exp-nav-item{
  padding:14px 20px;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  text-transform:uppercase;letter-spacing:.12em;color:var(--text3);
  border-left:2px solid var(--border);cursor:pointer;
  transition:all .3s;background:transparent;border:none;
  text-align:left;
}
.exp-nav-item.active,.exp-nav-item:hover{
  color:var(--c1);
  background:rgba(0,255,238,.05);
  border-left-color:var(--c1);
  padding-left:24px;
}
.exp-nav-item.active{border-left:2px solid var(--c1)}
.exp-pane{display:none}
.exp-pane.active{display:block}
.exp-pane-head{margin-bottom:28px}
.exp-pane-title{
  font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;
  color:var(--text);letter-spacing:.05em;margin-bottom:6px;
}
.exp-pane-sub{
  font-family:'Syne',sans-serif;font-size:1rem;color:var(--c1);
  font-weight:400;margin-bottom:4px;
}
.exp-pane-period{
  font-family:'JetBrains Mono',monospace;font-size:.65rem;
  color:var(--text3);text-transform:uppercase;letter-spacing:.15em;
}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.exp-bullets li{
  font-size:.92rem;color:var(--text2);line-height:1.8;
  padding-left:22px;position:relative;font-weight:400;
}
.exp-bullets li::before{
  content:'▶';position:absolute;left:0;color:var(--c1);
  font-size:.5rem;top:6px;
}
.exp-chips{display:flex;flex-wrap:wrap;gap:8px}
.exp-chip{
  font-family:'JetBrains Mono',monospace;font-size:.6rem;
  padding:5px 12px;background:rgba(0,136,255,.08);
  border:1px solid rgba(0,136,255,.2);color:var(--c2);
  text-transform:uppercase;letter-spacing:.1em;
}
.exp-metrics-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:24px}
.exp-metric-box{
  padding:16px 20px;background:rgba(0,255,238,.04);
  border:1px solid rgba(0,255,238,.1);
  display:flex;flex-direction:column;gap:4px;
  min-width:110px;
}
.emb-val{
  font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;
  color:var(--c1);line-height:1;
}
.emb-lbl{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  color:var(--text3);text-transform:uppercase;letter-spacing:.1em;
}

/* PROJECT GRID */
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.proj-card{
  background:var(--surface);border:1px solid var(--border);
  position:relative;overflow:hidden;cursor:pointer;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d;
}
.proj-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,255,238,.04) 0%,transparent 50%,rgba(255,61,110,.04) 100%);
  opacity:0;transition:opacity .4s;
}
.proj-card:hover::before{opacity:1}
.proj-card:hover{
  border-color:rgba(0,255,238,.25);
  transform:translateY(-6px) scale(1.01);
  box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(0,255,238,.06);
}
.proj-card:nth-child(3n+2):hover{border-color:rgba(255,61,110,.25);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(255,61,110,.06)}
.proj-card:nth-child(3n+3):hover{border-color:rgba(0,136,255,.25);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(0,136,255,.06)}
.proj-top{padding:28px 28px 0;display:flex;justify-content:space-between;align-items:flex-start}
.proj-num{
  font-family:'Orbitron',monospace;font-size:3.5rem;
  font-weight:900;color:rgba(0,255,238,.06);line-height:1;
}
.proj-card:nth-child(3n+2) .proj-num{color:rgba(255,61,110,.06)}
.proj-card:nth-child(3n+3) .proj-num{color:rgba(0,136,255,.06)}
.proj-badge{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;
  padding:4px 10px;text-transform:uppercase;letter-spacing:.1em;
  border:1px solid rgba(127,255,0,.25);color:var(--c5);
  background:rgba(127,255,0,.05);
}
.proj-body{padding:8px 28px 28px}
.proj-title{
  font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;
  color:var(--text);margin-bottom:12px;letter-spacing:.03em;line-height:1.2;
}
.proj-desc{font-size:.85rem;color:var(--text3);line-height:1.7;margin-bottom:18px;font-weight:400}
.proj-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
.proj-tag{
  font-family:'JetBrains Mono',monospace;font-size:.55rem;

// ─── AURORA WEBGL ────────────────────────────────────────────────────────────
function initAurora() {
  const canvas = document.getElementById('aurora-canvas');
  if (!canvas) return;
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;

  const resize = () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  };
  resize();
  window.addEventListener('resize', resize);

  const vs = `
    attribute vec2 a_pos;
    void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
  `;
  const fs = `
    precision highp float;
    uniform float u_time;
    uniform vec2 u_res;
    uniform vec2 u_mouse;
    
    float hash(vec2 p) {
      p = fract(p * vec2(234.34, 435.345));
      p += dot(p, p + 34.23);
      return fract(p.x * p.y);
    }
    float noise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
                 mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      for(int i=0; i<5; i++) { v += a*noise(p); p = p*2.0+vec2(1.7,9.2); a*=0.5; }
      return v;
    }
    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      vec2 mu = u_mouse / u_res;
      float t = u_time * 0.18;
      
      vec2 q = vec2(fbm(uv + t*0.3), fbm(uv + vec2(5.2,1.3)));
      vec2 r = vec2(fbm(uv + 4.0*q + vec2(1.7,9.2) + t*0.15),
                    fbm(uv + 4.0*q + vec2(8.3,2.8) + t*0.12));
      float f = fbm(uv + 4.8*r);
      
      float md = length(uv - mu);
      f += 0.12 * exp(-md * 3.0);
      
      vec3 c1 = vec3(0.0, 0.05, 0.15);
      vec3 c2 = vec3(0.0, 0.3, 0.4);
      vec3 c3 = vec3(0.0, 0.8, 0.9);
      vec3 c4 = vec3(0.5, 0.0, 0.4);
      vec3 col = mix(c1, c2, clamp(f*f*4.0, 0.0, 1.0));
      col = mix(col, c3, clamp(f*f*f*8.0-0.6, 0.0, 1.0));
      col = mix(col, c4, clamp(length(q)*0.5, 0.0, 1.0));
      col *= 0.22;
      
      gl_FragColor = vec4(col, 1.0);
    }
  `;

  const compile = (type, src) => {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s); return s;
  };
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog); gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_res');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  let start = Date.now();
  const render = () => {
    const t = (Date.now() - start) / 1000;
    gl.uniform1f(uTime, t);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform2f(uMouse, mx, canvas.height - my);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  };
  render();
}

// ─── CURSOR TRAIL ────────────────────────────────────────────────────────────
function initTrail() {
  const canvas = document.getElementById('cursor-trail');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dots = [];
  const MAX = 22;
  let mx = -999, my = -999;

  const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  const draw = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    dots.push({ x: mx, y: my, life: 1 });
    if (dots.length > MAX) dots.shift();
    dots.forEach((d, i) => {
      d.life -= 0.04;
      const alpha = d.life * (i / MAX);
      const r = d.life * 3;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,255,238,${alpha * 0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  };
  draw();
}

// ─── HOOKS ───────────────────────────────────────────────────────────────────
function useScrollReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('vis');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.sr').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useMagneticEffect() {
  useEffect(() => {
    const btns = document.querySelectorAll('.magnetic');
    btns.forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const r = btn.getBoundingClientRect();
        const x = e.clientX - r.left - r.width / 2;
        const y = e.clientY - r.top - r.height / 2;
        btn.style.transform = `translate(${x * 0.25}px, ${y * 0.25}px)`;
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.transform = '';
        btn.style.transition = 'transform .4s cubic-bezier(.25,.46,.45,.94)';
        setTimeout(() => btn.style.transition = '', 400);
      });
    });
  }, []);
}

function useTilt() {
  useEffect(() => {
    const cards = document.querySelectorAll('.tilt-card');
    cards.forEach(card => {
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - 0.5;
        const y = (e.clientY - r.top) / r.height - 0.5;
        card.style.transform = `perspective(800px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) scale(1.02)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
        card.style.transition = 'transform .5s ease';
        setTimeout(() => card.style.transition = '', 500);
      });
    });
  }, []);
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [booted, setBooted] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    // Aurora
    setTimeout(initAurora, 100);
    initTrail();

    // Cursor
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0, mx = 0, my = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    });
    const animRing = () => {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    };
    animRing();

    document.addEventListener('mouseenter', e => {
      if (e.target.closest('a,button,.proj-card,.skill-panel,.cert-card'))
        document.body.classList.add('hovering');
      else document.body.classList.remove('hovering');
    }, true);

    // Progress
    const pb = document.getElementById('progress');
    window.addEventListener('scroll', () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
      pb.style.width = pct + '%';
      setScrolled(window.scrollY > 60);
    });
  }, []);

  useScrollReveal();
  useMagneticEffect();
  useTilt();

  return (
    <>
      <BootScreen onDone={() => setBooted(true)} />
      <Nav scrolled={scrolled} />
      <Hero />
      <div className="section-divider" />
      <Skills />
      <div className="section-divider" />
      <Experience />
      <div className="section-divider" />
      <Projects />
      <div className="section-divider" />
      <Certs />
      <div className="section-divider" />
      <Contact />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
